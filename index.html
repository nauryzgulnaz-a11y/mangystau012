<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таза Қазақстан — Ресми Экологиялық Бағдарламасы</title>
    <style>
        /* БАРЛЫҚ CSS СТИЛЬДЕРІ */
        :root {
            --primary-blue: #1e3a8a;    /* Ресми көк түс */
            --eco-green: #10b981;       /* Табиғат жасыл түсі */
            --accent-yellow: #f59e0b;   /* Күн сәулелі сары түс */
            --dark-blue: #0f172a;       /* Қою көк мәтіндер үшін */
            --light-bg: #f8fafc;        /* Ашық фон */
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--white);
            color: var(--dark-blue);
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 1. ШАПКА ЖӘНЕ ЛОГОТИП */
        .site-header {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-blue), var(--eco-green));
            border: 3px solid var(--accent-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 0.5px;
            line-height: 1.1;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--eco-green);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        .main-nav a {
            text-decoration: none;
            color: var(--dark-blue);
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .main-nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--eco-green);
            transition: width 0.3s ease;
        }

        .main-nav a:hover::after {
            width: 100%;
        }

        .main-nav a:hover {
            color: var(--eco-green);
        }

        .nav-btn {
            background-color: var(--eco-green);
            color: var(--white) !important;
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid transparent;
        }

        .nav-btn:hover {
            background-color: var(--white) !important;
            color: var(--eco-green) !important;
            border-color: var(--eco-green);
            transform: translateY(-2px);
        }

        /* ОРТАҚ СЕКЦИЯ СТИЛЬДЕРІ */
        section {
            padding: 100px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 36px;
            color: var(--primary-blue);
            font-weight: 800;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--eco-green), var(--accent-yellow));
            border-radius: 2px;
        }

        /* 2. БАСТЫ БАННЕР БӨЛІМІ */
        .hero-section {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(30, 58, 138, 0.6)), 
                        url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
            height: 90vh;
            display: flex;
            align-items: center;
            color: var(--white);
            margin-top: 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section::bottom {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: var(--white);
            clip-path: polygon(0 100%, 100% 100%, 100% 0);
        }

        .hero-content {
            max-width: 850px;
            margin: 0 auto;
        }

        .hero-section h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 25px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        .hero-section h1 span {
            color: var(--accent-yellow);
        }
